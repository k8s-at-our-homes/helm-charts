apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ template "common.fullname" . }}-service-monitor
  labels:
    {{- include "adguard.sync.objectLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "adguard.sync.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - adguard
  endpoints:
    - port: sync
      path: /metrics
