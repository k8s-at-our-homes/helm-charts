apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels: {{ include "csiAddons.objectLabels" . | nindent 4 }}
  name: {{ template "common.fullname" . }}-leader-election
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
