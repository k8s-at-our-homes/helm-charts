apiVersion: v1
kind: Service
metadata:
  name: {{ template "common.fullname" . }}
  labels:
    {{- include "homeAssistant.objectLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      targetPort: 8123
      port: 8123
      protocol: TCP
  selector:
    {{- include "homeAssistant.selectorLabels" . | nindent 4 }}
