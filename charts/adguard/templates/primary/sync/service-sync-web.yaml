apiVersion: v1
kind: Service
metadata:
  name: {{ template "common.fullname" . }}-sync-web
  labels:
    {{- include "adguard.sync.objectLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: sync
  selector:
    {{- include "adguard.frontend.selectorLabels" . | nindent 4 }}
